name: Gemini Canary

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  gemini-canary:
    name: gemini-canary
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Gemini canary with retries
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "::error::GEMINI_API_KEY secret is missing."
            exit 1
          fi

          max_attempts=3
          attempt=1
          transient_regex='ECONNREFUSED|ECONNRESET|ENOTFOUND|EAI_AGAIN|ETIMEDOUT|fetch failed|network error|timed out|socket hang up|TLS'

          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "Canary attempt ${attempt}/${max_attempts}"

            set +e
            output="$(bun run test:gemini:canary 2>&1)"
            status=$?
            set -e

            echo "${output}"

            if [ "${status}" -eq 0 ]; then
              echo "Gemini canary succeeded."
              exit 0
            fi

            if echo "${output}" | grep -Eiq "${transient_regex}" && [ "${attempt}" -lt "${max_attempts}" ]; then
              echo "Transient failure detected. Retrying..."
              sleep $((attempt * 5))
              attempt=$((attempt + 1))
              continue
            fi

            echo "::error::Gemini canary failed."
            exit "${status}"
          done

          echo "::error::Gemini canary failed after ${max_attempts} attempts."
          exit 1
