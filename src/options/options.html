<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speakeasy Settings</title>
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body class="min-h-screen bg-gradient-to-br from-slate-950 via-surface-900 to-slate-900 text-slate-100">
    <main class="mx-auto max-w-3xl px-6 py-10">
      <h1 class="text-2xl font-semibold">Speakeasy Settings</h1>
      <p class="mt-2 text-sm text-slate-300">
        Configure Gemini access, model behavior, and native tool usage for the popup chatbot.
      </p>

      <section class="mt-6 rounded-xl border border-surface-700 bg-surface-800/70 p-5">
        <h2 class="text-sm font-medium uppercase tracking-wide text-slate-400">Gemini Configuration</h2>

        <form id="settings-form" class="mt-4 space-y-5">
          <label class="block">
            <span class="mb-1 block text-sm text-slate-200">Gemini API key</span>
            <input
              id="api-key"
              name="apiKey"
              type="password"
              autocomplete="off"
              class="w-full rounded-md border border-surface-700 bg-surface-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-accent-400 focus:outline-none focus:ring-2 focus:ring-accent-500/40"
              placeholder="AI... or your Gemini API key"
              required
            />
          </label>

          <label class="block">
            <span class="mb-1 block text-sm text-slate-200">Model</span>
            <input
              id="model"
              name="model"
              type="text"
              class="w-full rounded-md border border-surface-700 bg-surface-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-accent-400 focus:outline-none focus:ring-2 focus:ring-accent-500/40"
              placeholder="gemini-3-flash-preview"
              required
            />
          </label>

          <label class="block">
            <span class="mb-1 block text-sm text-slate-200">System instruction (optional)</span>
            <textarea
              id="system-instruction"
              name="systemInstruction"
              rows="4"
              class="w-full rounded-md border border-surface-700 bg-surface-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-accent-400 focus:outline-none focus:ring-2 focus:ring-accent-500/40"
              placeholder="You are a concise assistant..."
            ></textarea>
          </label>

          <label class="block">
            <span class="mb-1 block text-sm text-slate-200">Max tool round trips</span>
            <input
              id="max-tool-round-trips"
              name="maxToolRoundTrips"
              type="number"
              min="1"
              max="20"
              class="w-full rounded-md border border-surface-700 bg-surface-900 px-3 py-2 text-sm text-slate-100 focus:border-accent-400 focus:outline-none focus:ring-2 focus:ring-accent-500/40"
              required
            />
          </label>

          <fieldset class="space-y-2">
            <legend class="text-sm font-medium text-slate-200">Tools</legend>

            <label class="flex items-center gap-2 text-sm text-slate-200">
              <input id="tool-google-search" type="checkbox" class="h-4 w-4 rounded border-surface-600 bg-surface-900" />
              Google Search
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-200">
              <input id="tool-google-maps" type="checkbox" class="h-4 w-4 rounded border-surface-600 bg-surface-900" />
              Google Maps
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-200">
              <input id="tool-code-execution" type="checkbox" class="h-4 w-4 rounded border-surface-600 bg-surface-900" />
              Code Execution
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-200">
              <input id="tool-url-context" type="checkbox" class="h-4 w-4 rounded border-surface-600 bg-surface-900" />
              URL Context
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-200">
              <input id="tool-file-search" type="checkbox" class="h-4 w-4 rounded border-surface-600 bg-surface-900" />
              File Search
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-200">
              <input id="tool-mcp-servers" type="checkbox" class="h-4 w-4 rounded border-surface-600 bg-surface-900" />
              MCP Servers
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-200">
              <input id="tool-function-calling" type="checkbox" class="h-4 w-4 rounded border-surface-600 bg-surface-900" />
              Function Calling (local tools)
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-200">
              <input id="tool-computer-use" type="checkbox" class="h-4 w-4 rounded border-surface-600 bg-surface-900" />
              Computer Use (not supported yet in this extension runtime)
            </label>
          </fieldset>

          <label class="block">
            <span class="mb-1 block text-sm text-slate-200">File Search store names (comma-separated)</span>
            <input
              id="file-search-store-names"
              name="fileSearchStoreNames"
              type="text"
              class="w-full rounded-md border border-surface-700 bg-surface-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-accent-400 focus:outline-none focus:ring-2 focus:ring-accent-500/40"
              placeholder="my-docs-store, support-kb-store"
            />
          </label>

          <label class="block">
            <span class="mb-1 block text-sm text-slate-200">MCP server URLs (comma-separated)</span>
            <input
              id="mcp-server-urls"
              name="mcpServerUrls"
              type="text"
              class="w-full rounded-md border border-surface-700 bg-surface-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-accent-400 focus:outline-none focus:ring-2 focus:ring-accent-500/40"
              placeholder="https://example.com/mcp"
            />
          </label>

          <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
            <label class="block">
              <span class="mb-1 block text-sm text-slate-200">Maps latitude (optional)</span>
              <input
                id="maps-latitude"
                name="mapsLatitude"
                type="number"
                step="any"
                class="w-full rounded-md border border-surface-700 bg-surface-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-accent-400 focus:outline-none focus:ring-2 focus:ring-accent-500/40"
                placeholder="37.4220"
              />
            </label>

            <label class="block">
              <span class="mb-1 block text-sm text-slate-200">Maps longitude (optional)</span>
              <input
                id="maps-longitude"
                name="mapsLongitude"
                type="number"
                step="any"
                class="w-full rounded-md border border-surface-700 bg-surface-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-accent-400 focus:outline-none focus:ring-2 focus:ring-accent-500/40"
                placeholder="-122.0841"
              />
            </label>
          </div>

          <label class="block">
            <span class="mb-1 block text-sm text-slate-200">
              Computer Use excluded predefined actions (comma-separated, optional)
            </span>
            <input
              id="computer-use-excluded-actions"
              name="computerUseExcludedActions"
              type="text"
              class="w-full rounded-md border border-surface-700 bg-surface-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-accent-400 focus:outline-none focus:ring-2 focus:ring-accent-500/40"
              placeholder="scroll_down, drag_and_drop"
            />
          </label>

          <div class="flex items-center justify-between gap-4 border-t border-surface-700 pt-4">
            <p class="text-sm text-slate-300">Version <span id="version" class="font-semibold"></span></p>
            <button
              type="submit"
              class="rounded-md bg-accent-500 px-4 py-2 text-sm font-medium text-slate-950 transition hover:bg-accent-400 focus:outline-none focus:ring-2 focus:ring-accent-400/70"
            >
              Save
            </button>
          </div>

          <p id="save-status" class="text-sm text-slate-300" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
