<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speakeasy Settings</title>
  <link rel="icon" type="image/svg+xml" href="icons/gemini-logo.svg" />
  <link rel="stylesheet" href="ui.css" />
</head>

<body class="settings-page">
  <main class="settings-layout">
    <h1 class="settings-heading">Speakeasy Settings</h1>
    <p class="settings-description">
      Configure Gemini access, model behavior, and native tool usage.
    </p>

    <section class="settings-card">
      <h2 class="settings-section-heading">Provider
        Configuration</h2>

      <form id="settings-form" class="settings-form">
        <label class="settings-field">
          <span class="settings-label">Gemini API key</span>
          <input id="api-key" name="apiKey" type="password" autocomplete="off"
            class="settings-input"
            placeholder="AI... or your Gemini API key" required />
        </label>

        <section class="settings-field">
          <span class="settings-label">Model thinking defaults</span>
          <div class="settings-grid-two">
            <input id="model-name-flash" type="text"
              class="settings-input"
              readonly />
            <select id="model-thinking-level-flash" name="modelThinkingLevelFlash"
              class="settings-input">
            </select>
          </div>
          <div class="settings-grid-two mt-3">
            <input id="model-name-pro" type="text"
              class="settings-input"
              readonly />
            <select id="model-thinking-level-pro" name="modelThinkingLevelPro"
              class="settings-input">
            </select>
          </div>
          <span class="settings-label mt-4">Custom models</span>
          <div id="custom-model-rows" class="space-y-3"></div>
          <button id="add-custom-model" type="button" class="settings-inline-button mt-3">
            Add custom model
          </button>
          <template id="custom-model-row-template">
            <div class="settings-grid-two" data-custom-model-row>
              <input type="text"
                class="settings-input"
                data-custom-model-input
                placeholder="gemini-3.2-custom" />
              <div class="flex gap-3">
                <select data-custom-model-thinking-level
                  class="settings-input">
                </select>
                <button type="button"
                  class="settings-inline-button"
                  data-remove-custom-model>
                  Remove
                </button>
              </div>
            </div>
          </template>
        </section>

        <label class="settings-field">
          <span class="settings-label">System instruction <span
              class="settings-optional">(optional)</span></span>
          <textarea id="system-instruction" name="systemInstruction" rows="4"
            class="settings-input resize-y"
            placeholder="You are a concise assistant..."></textarea>
        </label>

        <label class="settings-tool-option">
          <input id="store-interactions" type="checkbox"
            class="settings-checkbox" />
          Store interactions on Gemini servers
        </label>

        <label class="settings-field">
          <span class="settings-label">Max tool round trips</span>
          <input id="max-tool-round-trips" name="maxToolRoundTrips" type="number" min="1" max="20"
            class="settings-input"
            required />
        </label>

        <label class="settings-field">
          <span class="settings-label">Page text extraction engine</span>
          <select id="page-text-extraction-engine" name="pageTextExtractionEngine"
            class="settings-input">
            <option value="defuddle">Defuddle</option>
            <option value="readability">Readability</option>
          </select>
        </label>

        <fieldset class="settings-tools">
          <legend
            class="settings-section-heading w-full mb-4">
            Tools & Execution</legend>

          <div class="settings-tool-grid">
            <label class="settings-tool-option">
              <input id="tool-google-search" type="checkbox"
                class="settings-checkbox" />
              Google Search
            </label>
            <label class="settings-tool-option">
              <input id="tool-google-maps" type="checkbox"
                class="settings-checkbox" />
              Google Maps
            </label>
            <label class="settings-tool-option">
              <input id="tool-code-execution" type="checkbox"
                class="settings-checkbox" />
              Code Execution
            </label>
            <label class="settings-tool-option">
              <input id="tool-url-context" type="checkbox"
                class="settings-checkbox" />
              URL Context
            </label>
            <label class="settings-tool-option">
              <input id="tool-file-search" type="checkbox"
                class="settings-checkbox" />
              File Search
            </label>
            <label class="settings-tool-option">
              <input id="tool-mcp-servers" type="checkbox"
                class="settings-checkbox" />
              MCP Servers
            </label>
            <label class="settings-tool-option col-span-1 sm:col-span-2">
              <input id="tool-function-calling" type="checkbox"
                class="settings-checkbox" />
              Function Calling <span class="text-white/40 text-xs ml-1">(local tools)</span>
            </label>
            <label class="settings-tool-option col-span-1 sm:col-span-2">
              <input id="tool-computer-use" type="checkbox"
                class="settings-checkbox" />
              Computer Use <span class="text-xs ml-1">(experimental)</span>
            </label>
          </div>
        </fieldset>

        <label class="settings-field">
          <span class="settings-label">File Search store names <span
              class="settings-optional">(comma-separated)</span></span>
          <input id="file-search-store-names" name="fileSearchStoreNames" type="text"
            class="settings-input"
            placeholder="fileSearchStores/my-docs-store, fileSearchStores/support-kb-store" />
        </label>

        <label class="settings-field">
          <span class="settings-label">MCP server URLs <span
              class="settings-optional">(comma-separated)</span></span>
          <input id="mcp-server-urls" name="mcpServerUrls" type="text"
            class="settings-input"
            placeholder="https://example.com/mcp" />
        </label>

        <div class="settings-grid-two">
          <label class="settings-field">
            <span class="settings-label">Maps latitude <span
                class="settings-optional">(optional)</span></span>
            <input id="maps-latitude" name="mapsLatitude" type="number" step="any"
              class="settings-input"
              placeholder="37.4220" />
          </label>

          <label class="settings-field">
            <span class="settings-label">Maps longitude <span
                class="settings-optional">(optional)</span></span>
            <input id="maps-longitude" name="mapsLongitude" type="number" step="any"
              class="settings-input"
              placeholder="-122.0841" />
          </label>
        </div>

        <label class="settings-field">
          <span class="settings-label">
            Computer Use excluded actions <span class="settings-optional">(comma-separated, optional)</span>
          </span>
          <input id="computer-use-excluded-actions" name="computerUseExcludedActions" type="text"
            class="settings-input"
            placeholder="scroll_down, drag_and_drop" />
        </label>

        <div class="settings-footer">
          <p class="settings-version-label">Version <span id="version"
              class="settings-version-value"></span></p>
          <button type="submit"
            class="settings-save-button">
            Save Details
          </button>
        </div>

        <p id="save-status" class="settings-status" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script type="module" src="options.js"></script>
</body>

</html>
