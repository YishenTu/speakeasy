<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speakeasy</title>
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body>
    <main class="flex h-[32rem] w-[24rem] flex-col bg-gradient-to-b from-surface-900 to-slate-950">
      <header class="border-b border-slate-700 px-4 py-3">
        <h1 class="text-lg font-semibold tracking-tight text-slate-100">Speakeasy</h1>
        <p class="text-xs text-slate-400">AI chat popup scaffold for Chrome.</p>
      </header>

      <section class="flex min-h-0 flex-1 flex-col px-4 py-3">
        <ol id="message-list" class="flex flex-1 flex-col gap-2 overflow-y-auto pr-1"></ol>

        <form id="chat-form" class="mt-3 flex items-center gap-2" autocomplete="off">
          <input
            id="chat-input"
            name="message"
            type="text"
            placeholder="Ask Speakeasy anything..."
            class="min-w-0 flex-1 rounded-md border border-surface-700 bg-surface-800 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-accent-400 focus:outline-none focus:ring-2 focus:ring-accent-500/40"
            required
          />
          <button
            type="submit"
            class="rounded-md bg-accent-500 px-3 py-2 text-sm font-medium text-slate-950 transition hover:bg-accent-400 focus:outline-none focus:ring-2 focus:ring-accent-400/70"
          >
            Send
          </button>
        </form>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
